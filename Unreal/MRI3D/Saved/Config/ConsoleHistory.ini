mesh_name}\")\r\n\r\n    mat = create_colored_material(mesh_name, r, g, b)\r\n    smc.set_material(0, mat)\r\n    spawned += 1\r\n\r\nfor name, info in tumor_map.items():\r\n    mesh_name = Path(info[\"file\"]).stem\r\n    r, g, b = info[\"color_rgb_0_1\"]\r\n\r\n    mesh = mesh_map.get(mesh_name)\r\n    if not mesh:\r\n        continue\r\n\r\n    actor = editor_subsystem.spawn_actor_from_class(\r\n        unreal.StaticMeshActor,\r\n        unreal.Vector(0, 0, 0),\r\n        unreal.Rotator(0, 0, 0)\r\n    )\r\n    smc = actor.get_component_by_class(unreal.StaticMeshComponent)\r\n    smc.set_static_mesh(mesh)\r\n    actor.set_actor_label(f\"Tumor_{name}\")\r\n\r\n    mat = create_colored_material(name, r, g, b)\r\n    smc.set_material(0, mat)\r\n    spawned += 1\r\n\r\nprint(f\"Spawned {spawned} brain region actors into the scene\")"
